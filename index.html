<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simpson Quotes App 🍩</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
</head>
<body>

    <img src="HomerFoto.png" alt="Homer volando" class="homer-esquina">

    <div class="container">
        <img src="SimpsonsLogo.png" alt="Logo de Los Simpson" class="logo">
        
        <div id="quote-container" class="card">
            <p id="quote-text">Cargando sabiduría de Springfield...</p>
            <h2 id="character-name"></h2>
            <img id="character-img" src="" alt="">
        </div>

        <div class="buttons">
            <button id="btn-next">¡Otra cita! 🍩</button>
            <button id="btn-fav">Guardar Favorito ⭐</button>
        </div>

        <div class="favorites-section">
            <h3>Mis Citas Favoritas</h3>
            <ul id="fav-list"></ul>
            <button id="btn-clear" class="btn-small">Borrar Todo 🗑️</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
